<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bees & Wasps - Endless Runner</title>
<link rel="stylesheet" href="style.css?v=69815b3">
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="score" id="scoreDisplay">0</div>
  <div class="high-score" id="highScoreDisplay">Best: 0</div>
  <div class="health-bar"><div class="health-bar-fill" id="healthFill"></div></div>
</div>

<!-- Audio Controls -->
<div id="audioControls">
  <button id="musicToggle" class="audio-btn" title="Toggle Music">♪</button>
  <button id="ambientToggle" class="audio-btn" title="Toggle Ambient Sounds">🌿</button>
</div>

<!-- Start / Game-over overlay -->
<div id="overlay">
  <h1 id="overlayTitle">Bees & Wasps</h1>
  <div class="final-score hidden" id="finalScore"></div>
  <p id="overlayHint">Arrow keys / touch to move, SPACE to boost, P to pause</p>
</div>

<!-- Pause overlay -->
<div id="pauseOverlay" class="hidden">
  <h1>Paused</h1>
  <button id="resumeBtn">Resume</button>
  <button id="restartBtn">Restart</button>
  <p class="pause-hint">Press P to resume</p>
</div>

<!-- Mobile touch controls -->
<div id="touchControls">
  <div class="touch-left">
    <button class="touch-btn" id="btnLeft">&#9664;</button>
    <button class="touch-btn" id="btnRight">&#9654;</button>
  </div>
  <button class="touch-btn touch-boost" id="btnBoost">BOOST</button>
</div>

<!-- Detect touch support early so CSS can respond reliably -->
<script>
  if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
    document.body.classList.add('touch-device');
  }
</script>

<!-- Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="game.js?v=69815b3"></script>
</body>
</html>
